name: daily edition

on:
  schedule:
    # 04:05 UTC = 00:05 EDT (été).
    # ⚠️ Au passage à l'heure d'hiver (1er dim. de novembre), repasser à
    # '5 5 * * *' pour que ça reste 00:05 EST (sinon ce sera 23:05 EST la veille).
    - cron: '5 4 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: "Date d'édition (YYYY-MM-DD). Vide = hier (local)."
        required: false
        default: ''
      force:
        description: "Réécrire l'édition même si elle existe déjà."
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  # Force les actions JavaScript (checkout, setup-node) sur Node 24 du runner.
  # Sans ça, warning de dépréciation Node 20 (cosmétique, mais on l'éteint).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: daily-edition
  cancel-in-progress: false

jobs:
  edition:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Run daily edition
        env:
          WEATHERFLOW_TOKEN: ${{ secrets.WEATHERFLOW_TOKEN }}
          WEATHERFLOW_STATION_ID: ${{ secrets.WEATHERFLOW_STATION_ID }}
          BIRDWEATHER_STATION_ID: ${{ secrets.BIRDWEATHER_STATION_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TZ: America/Toronto
        run: |
          ARGS=""
          if [ -n "${{ inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ inputs.date }}"
          fi
          if [ "${{ inputs.force }}" = "true" ]; then
            ARGS="$ARGS --force"
          fi
          npm run daily -- $ARGS

      - name: Commit & push data/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Aucun changement dans data/, rien à commiter."
            exit 0
          fi
          DATE_TAG=$(date -u -d 'yesterday' +%Y-%m-%d)
          git commit -m "data: édition ${DATE_TAG}"
          git push
